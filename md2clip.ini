[style]
# Base font size for body text (pt). Headings scale relative to this.
font_size = 11
# Font family
font_family = Aptos, Calibri, sans-serif
# Code font family
code_font_family = Consolas, Courier New, monospace
# Code font size (pt)
code_font_size = 10
# Wrap content in a subtle bordered box (like ChatGPT's card UI)
content_box = false
